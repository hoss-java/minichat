name: main-merge-changes

on:
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string

permissions:
  contents: write

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SOURCE_BRANCH: develop
      TARGET_BRANCH: main
      GITMAIN_FILE: .gitmain

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repo (fetch all)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 4: Check out requested commit
      - name: Check out requested commit
        run: |
          echo "Requested commit: ${{ inputs.commit_sha }}"
          git fetch origin develop --unshallow || true
          git fetch origin develop
          git fetch --all --tags
          git checkout --force ${{ inputs.commit_sha }}
          git rev-parse HEAD
          git log -1 --oneline

      # Step 5: Debug git state
      - name: Debug git state
        run: |
          git status --short --branch
          git log -3 --oneline

      # Step 6: Read the list of files and folders
      - name: Read files list
        id: readfiles
        run: |
          if [[ -f "${GITMAIN_FILE}" ]]; then
            FILES_TO_CHECK=$(grep -v '^\s*#' "${GITMAIN_FILE}" | awk '{print $1}' | tr '\n' ' ' | xargs)
            if [[ -z "$FILES_TO_CHECK" ]]; then
              echo "No valid files to check!"
              exit 1
            fi
            echo "FILES_TO_CHECK=${FILES_TO_CHECK}" >> $GITHUB_ENV
          else
            echo "File list not found!"
            exit 0
          fi

      # Step 7: Check for changes
      - name: Check for changes
        id: check-changes
        run: |
          git fetch origin ${TARGET_BRANCH}
          git fetch origin ${SOURCE_BRANCH}

          CHANGED_FILES=$(git diff --name-only origin/${TARGET_BRANCH}..origin/${SOURCE_BRANCH})

          if [[ -f "${GITMAIN_FILE}" ]]; then
            FILES_TO_CHECK=$(grep -v '^\s*#' "${GITMAIN_FILE}" | awk '{print $1}' | tr '\n' ' ')
            if [[ -z "$FILES_TO_CHECK" ]]; then
              echo "No valid files to check!"
              exit 1
            fi
          else
            echo "File list not found!"
            exit 0
          fi

          for file in ${FILES_TO_CHECK}; do
            if echo "$CHANGED_FILES" | grep -q "$file"; then
              echo "File changed: $file"
              echo "file_changed=true" >> $GITHUB_ENV
              break
            fi
          done

      # Step 8: Run Java Tests
      - name: Run Java Tests
        if: env.file_changed == 'true'
        run: |
          output=$(mvn -f minichat test -Dspring.profiles.active=test)
          TEST_RESULT=$?
          output+=$(mvn -f minichat clean -Dspring.profiles.active=test)

          if [ $TEST_RESULT -ne 0 ]; then
            echo "$output"
            exit 1
          fi

      # Step 9: Run JS Tests
      # TEMPORARILY DISABLED: JS tests skipped due to pending test setup
      - name: Run JS Tests
        if: env.file_changed == 'true' && false
        run: |
          cd clients
          npm instal jest
          npx jest webclientv1/tests/js
          if [ $? -ne 0 ]; then
            exit 1
          fi

      # Step 10: Cleanup node_modules
      - name: Cleanup node_modules
        if: env.file_changed == 'true'
        run: |
          cd clients
          rm -rf node_modules
          rm -rf package-lock.json

      # Step 11: Copy and Push Changes
      - name: Copy and Push Changes
        if: env.file_changed == 'true' && success()
        run: |
          git checkout ${TARGET_BRANCH}

          changes_made=false
          for file in ${FILES_TO_CHECK}; do
            if git checkout ${SOURCE_BRANCH} -- "$file"; then
              changes_made=true
            fi
          done

          if [[ "$(git status --porcelain)" ]]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add .
            git commit -m "[AUTO-GENERATE] Auto-merge from ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
            git push origin ${TARGET_BRANCH}
          else
            echo "No changes to push"
            exit 0
          fi
