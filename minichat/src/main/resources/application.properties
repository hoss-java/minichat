spring.application.name=minichat
server.port=8080
#server.servlet.context-path=/api

# JPA common settings
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.minichat=DEBUG

# JWT Configuration
jwt.secret=your-secret-key-min-256-bits-long-for-hs256-algorithm-security
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=2592000000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:4200

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.url=http://localhost:3000

# Admin Users Configuration
users.admins[0].username=admin
users.admins[0].email=admin@minichat.com
users.admins[0].password=Admin123!
users.admins[0].active=true
