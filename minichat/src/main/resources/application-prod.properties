# Application Name
spring.application.name=minichat

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://172.32.0.16:3306/minichat
spring.datasource.username=minichat
spring.datasource.password=minichatpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.root=WARN
logging.level.com.minichat=INFO

# Admin Users Configuration
users.admins[0].username=admin
users.admins[0].email=admin@minichat.com
users.admins[0].password=Admin123!
